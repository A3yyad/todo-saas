<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ToDo App</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.8rem; }
    form { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type=text] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px; }
    li.done span { text-decoration: line-through; color: #aaa; }
    a { text-decoration: none; color: #4f46e5; font-size: 0.85rem; }
    a.del { color: #e53e3e; }
  </style>
</head>
<body>
  <h1>📝 ToDo App</h1>
  <form action="/add" method="POST">
    <input type="text" name="title" placeholder="Add a new task..." required>
    <button type="submit">Add</button>
  </form>
  <ul>
    {% for task in tasks %}
    <li class="{{ task.status }}">
      <input type="checkbox" {% if task.status == 'done' %}checked{% endif %}
             onclick="location.href='/complete/{{ task.id }}'">
      <span>{{ task.title }}</span>
      <a href="/delete/{{ task.id }}" class="del" onclick="return confirm('Delete?')">delete</a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
